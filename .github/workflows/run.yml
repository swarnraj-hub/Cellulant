name: Tingg Payments Export

on:
  workflow_dispatch:

jobs:
  run-tingg:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Tingg automation
        env:
          TINGG_USERNAME:        ${{ secrets.TINGG_USERNAME }}
          TINGG_PASSWORD:        ${{ secrets.TINGG_PASSWORD }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TINGG_S3_BUCKET:       ${{ secrets.TINGG_S3_BUCKET }}
          TINGG_S3_PREFIX:       ${{ secrets.TINGG_S3_PREFIX }}
          TINGG_HEADLESS:        "true"
        run: python tingg_login.py

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tingg-error-screenshot
          path: tingg_error.png
          retention-days: 7
          if-no-files-found: ignore
